<div class="row justify-content-center">
  <div class="col-md-8">
    <h2 class="mb-4 text-center">GitHub Felhasználó Keresése</h2>
    
    <div class="input-group mb-4 shadow-sm">
      <input type="text" class="form-control form-control-lg" 
             placeholder="Írd be a felhasználónevet..." 
             [(ngModel)]="searchUser" 
             (keyup.enter)="onSearch()">
      <button class="btn btn-primary btn-lg" type="button" (click)="onSearch()">
        <i class="bi bi-search me-2"></i>Keresés
      </button>
    </div>

    <div class="row">
      <div class="col-md-4" *ngFor="let user of users()">
        <div class="card h-100 shadow-sm text-center">
          <img [src]="user.avatar_url" class="card-img-top rounded-circle mx-auto mt-3 p-2" 
               alt="Avatar" style="width: 120px; height: 120px; object-fit: cover;">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold text-truncate">{{ user.login }}</h5>
            <p class="card-text text-muted small">ID: {{ user.id }}</p>
            <a [routerLink]="['/user', user.login]" class="btn btn-outline-primary btn-sm mt-auto">
              Adatlap megtekintése
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
