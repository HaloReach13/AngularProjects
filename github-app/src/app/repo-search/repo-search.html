<div class="row justify-content-center">
  <div class="col-md-8">
    <h2 class="mb-4 text-center">GitHub Repository Keresése</h2>
    
    <div class="input-group mb-4 shadow-sm">
      <input type="text" class="form-control form-control-lg" 
             placeholder="Írd be a projekt nevét..." 
             [(ngModel)]="searchRepo" 
             (keyup.enter)="onSearch()">
      <button class="btn btn-success btn-lg" type="button" (click)="onSearch()">
        <i class="bi bi-search me-2"></i>Keresés
      </button>
    </div>

    <div class="list-group shadow-sm">
      <div *ngFor="let repo of repos()" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
        <div>
          <a [routerLink]="['/repo', repo.owner.login, repo.name]" class="fw-bold text-decoration-none h5">
            {{ repo.name }}
          </a>
          <span class="text-muted small d-block">Tulajdonos: {{ repo.owner.login }}</span>
        </div>
        <div>
          <span class="badge bg-light text-dark border me-2"><i class="bi bi-star-fill me-1"></i>{{ repo.stargazers_count }}</span>
          <span class="badge bg-light text-dark border">{{ repo.language || 'N/A' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
