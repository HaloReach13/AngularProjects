<div class="container mx-auto p-4">
  <div class="mb-6">
    <h4 class="text-2xl font-bold text-black-800">Darts players application</h4>
  </div>

  <div class="flex flex-col md:flex-row gap-6">
    <div class="w-full md:w-3/4">
      <button
        class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded shadow-sm transition-colors mb-4"
        (click)="isFormVisible = true">
        New player
      </button>

      <ul class="space-y-3">
        @for (player of players; track player.id) {
        <li class="flex justify-between items-center p-4 border border-gray-200 rounded-lg shadow-sm bg-white">
          <div>
            <span class="text-sm opacity-80">
              {{ player.rank }} rank,
            </span>
            <span class="font-semibold">{{ player.name }}</span> ({{ player.nickname }}) <br class="sm:hidden">
            <span class="font-semibold">${{ player.salary }}</span>
            <span class="text-sm opacity-80 ml-2">Experience: {{ player.experience }}</span>
          </div>
          <button
            class="bg-red-500 hover:bg-red-600 text-white font-medium py-1.5 px-3 rounded shadow-sm transition-colors ml-4"
            (click)="deletePlayer(player)">
            Delete
          </button>
        </li>
        }
      </ul>
    </div>

    <div class="w-full md:w-1/4">
      @if (isFormVisible) {
      <div class="bg-gray-50 p-5 rounded-lg border border-gray-200 shadow-sm">
        <div class="mb-4">
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            id="name" name="name" [(ngModel)]="newPlayer.name">
        </div>
        <div class="mb-4">
          <label for="nickname" class="block text-sm font-medium text-gray-700 mb-1">Nickname</label>
          <input type="text"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            id="nickname" name="nickname" [(ngModel)]="newPlayer.nickname">
        </div>
        <div class="mb-4">
          <label for="rank" class="block text-sm font-medium text-gray-700 mb-1">Rank</label>
          <input type="number"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            id="rank" name="rank" [(ngModel)]="newPlayer.rank">
        </div>
        <div class="mb-4">
          <label for="experience" class="block text-sm font-medium text-gray-700 mb-1">Experience</label>
          <select
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            id="experience" name="experience" [(ngModel)]="newPlayer.experience">
            <option value="">Select experience</option>
            <option value="0-5">0-5 years</option>
            <option value="5-10">5-10 years</option>
            <option value="10+">10+ years</option>
          </select>
        </div>
          <div class="mb-4">
            <label for="salary" class="block text-sm font-medium text-gray-700 mb-1">Salary</label>
            <input type="number"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              id="salary" name="salary" [(ngModel)]="newPlayer.salary">
          </div>
          <button
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded shadow-sm transition-colors"
            (click)="savePlayer()">
            Save
          </button>
        </div>
        }
      </div>
    </div>
