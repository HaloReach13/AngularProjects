<div class="row">
    <div class="col-md-12">
        <h2 class="mb-4"><i class="bi bi-pencil-square"></i> Feladat szerkesztése</h2>
        @if (todo()) {
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Feladat leírása</label>
            <input type="text" class="form-control form-control-lg" [(ngModel)]="todo()!.description" />
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Határidő</label>
            <input type="date" class="form-control" [(ngModel)]="todo()!.deadline" />
        </div>

        <div class="mb-4 form-check form-switch fs-5">
            <input class="form-check-input text-success" type="checkbox" role="switch" id="statusSwitch"
                [(ngModel)]="todo()!.completionStatus">
            <label class="form-check-label text-muted fs-6 fw-medium" for="statusSwitch">
                Teljesített állapot
            </label>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success px-4 d-flex align-items-center gap-1" (click)="save()">
                <i class="bi bi-save"></i> Mentés
            </button>
            <button class="btn btn-outline-secondary px-4 d-flex align-items-center gap-1" (click)="goBack()">
                <i class="bi bi-arrow-left"></i> Mégse
            </button>
        </div>
        }
    </div>
</div>
